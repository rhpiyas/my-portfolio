<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Thank You | Rakib Hasan Piyas</title>
  <meta content="Thank you for reaching out to Rakib Hasan Piyas." name="description">
  <meta content="thank you, contact, portfolio" name="keywords">

  <!-- Favicons -->
  <link href="assets/img/favicon.png" rel="icon">
  <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/aos/aos.css" rel="stylesheet">

  <!-- Main CSS File -->
  <link href="assets/css/main.css" rel="stylesheet">

  <style>
    body.thank-you-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(60, 82, 99, 0.22), transparent 35%),
        linear-gradient(135deg, #0f1720 0%, #1c2630 48%, #0f1720 100%);
      color: #eef2f7;
    }

    .thank-you-shell {
      width: min(920px, calc(100% - 2rem));
      padding: 2rem;
    }

    .thank-you-card {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      padding: 3rem;
      background: rgba(9, 15, 21, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(18px);
    }

    .thank-you-card::before {
      content: "";
      position: absolute;
      inset: -30% auto auto -10%;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: rgba(96, 125, 139, 0.18);
      filter: blur(10px);
    }

    .thank-you-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 1rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #dce7f2;
      font-size: 0.92rem;
      letter-spacing: 0.02em;
      margin-bottom: 1.5rem;
    }

    .thank-you-card h1 {
      color: #ffffff;
      font-size: clamp(2.2rem, 4vw, 4rem);
      margin-bottom: 1rem;
    }

    .thank-you-card p {
      color: rgba(238, 242, 247, 0.82);
      font-size: 1.05rem;
      line-height: 1.75;
      max-width: 52rem;
    }

    .thank-you-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 2rem;
    }

    .thank-you-actions .btn {
      border-radius: 999px;
      padding: 0.9rem 1.45rem;
      font-weight: 600;
    }

    .btn-home {
      background: #ffffff;
      color: #101820;
      border: 1px solid #ffffff;
    }

    .btn-home:hover {
      background: transparent;
      color: #ffffff;
    }

    .btn-message {
      background: transparent;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.24);
    }

    .btn-message:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }

    .thank-you-meta {
      margin-top: 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      color: rgba(238, 242, 247, 0.68);
      font-size: 0.95rem;
    }

    .thank-you-meta span {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
    }

    .thank-you-meta i {
      color: #9ec5ff;
    }

    @media (max-width: 576px) {
      .thank-you-shell {
        width: 100%;
        padding: 1rem;
      }

      .thank-you-card {
        padding: 1.75rem;
        border-radius: 22px;
      }
    }
  </style>
</head>

<body class="thank-you-page">
  <main class="thank-you-shell">
    <section class="thank-you-card" data-aos="fade-up">
      <div class="thank-you-badge">
        <i class="bi bi-check-circle-fill"></i>
        Message received
      </div>
      <h1>Thank you for reaching out.</h1>
      <p>
        Your message has been sent successfully. I appreciate you taking the time to contact me, and I will get back
        to you as soon as possible.
      </p>
      <div class="thank-you-actions">
        <a href="index.html#hero" class="btn btn-home">Back to Home</a>
        <a href="index.html#contact" class="btn btn-message">Send Another Message</a>
      </div>
      <div class="thank-you-meta">
        <span><i class="bi bi-envelope"></i> I usually reply as soon as I can.</span>
        <span><i class="bi bi-house-door"></i> Return to the portfolio anytime.</span>
      </div>
    </section>
  </main>

  <script src="assets/vendor/aos/aos.js"></script>
  <script>
    AOS.init({ duration: 800, once: true });
  </script>
</body>

</html>
